#   s: [0.50, 0.50, 1024]
#   m: [0.50, 1.00, 512]
#   l: [1.00, 1.00, 512]
#   x: [1.00, 1.50, 512]

# # YOLO11 backbone
# backbone:
#   # [from, repeats, module, args]
#   - [-1, 1, Conv, [16, 3, 2]]                # 0-P1/2
#   - [-1, 1, Conv, [32, 3, 2]]                # 1-P2/4
#   - [-1, 2, MANet, [32, 32, 2, True, 2, 3]]  # 2
#   - [-1, 1, Conv, [64, 3, 2]]                # 3-P3/8
#   - [-1, 3, MANet, [64, 64, 3, True, 2, 5]]  # 4
#   - [-1, 1, Conv, [128, 3, 2]]               # 5-P4/16
#   - [-1, 3, MANet, [128, 128, 3, True, 2, 5]]# 6
#   - [-1, 1, Conv, [256, 3, 2]]               # 7-P5/32
#   - [-1, 2, MANet, [256, 256, 2, True, 2, 3]]# 8
#   - [-1, 1, SPPF, [256, 5]]                  # 9
#   - [-1, 1, C2PSA, [256, 256, 1]]            # 10

# # YOLO11 head
# head:
#   - [-1, 1, nn.Upsample, [None, 2, "nearest"]]           # 11
